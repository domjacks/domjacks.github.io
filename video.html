    <body>
        <div class="layout-main">
           <div id="vid"></div>
        </div>
    </body>
    <script type="module">
        import { BigscreenPlayer } from 'http://localhost:8080/dist-local/esm/main.js'
        window.bigscreenPlayer = {playbackStrategy: 'msestrategy'}

        let player = BigscreenPlayer()
        window.bsp_player = player

        let playbackElement = document.getElementById('vid')
        playbackElement.style.height = '720px';
        playbackElement.style.width = '1280px';

        let minimalData = {
            initialPlaybackTime: 0,
            media: {
            captions: [],
            type: 'application/dash+xml',
            mimeType: 'video/mp4',
            kind: 'video',
            urls: [{
                url: 'http://localhost:8081/stream.mpd',
                cdn: ''
            }]
            }
        };

        player.init(playbackElement, minimalData, 'staticWindow', false,
        {
        onSuccess: () => {},
        onError: function () {
            player.toggleDebug();
            DebugTool.info('Initialisation failed.')
        }
        });


    </script>
